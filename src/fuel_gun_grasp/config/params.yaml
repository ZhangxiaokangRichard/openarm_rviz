# ==============================================================================
# 加油枪抓取功能包参数配置文件
# 说明：所有位置均基于机械臂基坐标系（base_link 原点），单位 m / rad / s
#
# OpenManipulator-X 工作空间约束（position_only IK）：
#   joint2 中心位于 (0.024, 0, 0.1875)，后级连杆总伸展长度 ~0.244m
#   安全工作范围：x=0.10~0.28m，|y|<0.15m，z=0.03~0.22m
#   （超出范围调用 goal_task_space_path_position_only 会报 Fail to solve IK）
# ==============================================================================

# ------------------------------------------------------------------------------
# 加油枪起点位置（position）
# 说明：orientation 字段保留供扩展，当前所有运动均调用 position_only 服务，
#       IK 不使用此姿态值，可按实际需求填写参考值。
# ------------------------------------------------------------------------------
gun_pose:
  position:
    x: 0.20      # 加油枪 X 坐标 (m)，机械臂正前方为正
    y: 0.00      # 加油枪 Y 坐标 (m)，机械臂左侧为正
    z: 0.24      # 加油枪 Z 坐标 (m)，竖直向上为正（模拟桌面高度 ~24cm）
  orientation:   # 参考姿态（不参与 IK，保留供调试记录）
    x: 0.0
    y: 0.0
    z: 0.0
    w: 1.0

# ------------------------------------------------------------------------------
# 安装终点位置（position）
# 与 gun_pose 保持相同横向距离，向侧方偏移，高度略高模拟安装口
# 几何验证：到 joint2 平面距离 ≈ 0.210m < 可达 0.244m
# ------------------------------------------------------------------------------
install_pose:
  position:
    x: 0.20      # 安装口 X 坐标 (m)
    y: 0.08      # 安装口 Y 坐标 (m)，向侧方偏移 8cm
    z: 0.12      # 安装口 Z 坐标 (m)
  orientation:
    x: 0.0
    y: 0.0
    z: 0.0
    w: 1.0

# ------------------------------------------------------------------------------
# 预备位参数
# 在抓取/放置点正上方悬停，避免直接从侧面进入导致碰撞
# 预备位 Z = pose.z + offset，需确保合计 Z 仍在可达范围内
# ------------------------------------------------------------------------------
pre_grasp_height_offset: 0.06   # 预备位相对抓取点的 Z 向偏移 (m)
pre_place_height_offset: 0.06   # 放置预备位相对安装点的 Z 向偏移 (m)
lift_height_offset:      0.07   # 抓住加油枪后竖直抬升高度 (m)

# ------------------------------------------------------------------------------
# 夹爪参数
# goal_tool_control 服务，gripper 关节取值范围 [-0.010, 0.019] (m)
# ------------------------------------------------------------------------------
gripper_open_value:  0.010    # 夹爪完全打开时的位移 (m)，>0 表示张开
gripper_grasp_value: -0.005   # 夹爪闭合抓取时的位移 (m)，负值表示收紧

# ------------------------------------------------------------------------------
# 运动时间参数（MinimumJerk 轨迹插值持续时间，值越大运动越慢越平滑）
# ------------------------------------------------------------------------------
path_time_home:     2.0   # 回零位运动时间 (s)
path_time_transit:  1.5   # 空间转移运动时间 (s)
path_time_approach: 1.0   # 竖直接近/放置慢速下降时间 (s)
path_time_lift:     1.0   # 抬升运动时间 (s)
path_time_gripper:  0.8   # 夹爪开合运动时间 (s)

# ------------------------------------------------------------------------------
# 等待时间参数（每步运动后额外 sleep，保证轨迹执行完毕再切换状态）
# 建议：等待时间 >= 0（实际等待 = path_time + wait_after）
# ------------------------------------------------------------------------------
wait_after_open:    1.0   # 夹爪打开后额外等待时间 (s)
wait_after_grasp:   1.5   # 夹爪闭合后额外等待时间 (s)，保证夹持稳定
wait_after_lift:    0.5   # 抬升后额外等待时间 (s)
wait_after_place:   1.0   # 放置后额外等待时间 (s)

# ------------------------------------------------------------------------------
# 回零位关节角度
# 任务开始前先运动到此安全位，避免从未知初始状态直接运动到任务起点造成碰撞
# 顺序：[joint1, joint2, joint3, joint4]，单位 rad
# ------------------------------------------------------------------------------
home_joint_positions: [0.0, 0.3, 0.3, -0.6]
# j1=0°, j2≈+17°, j3≈+17°, j4≈-34°  →  末端约 (0.30, 0, 0.12)
#
# 选此 home 的原因：
#   PRE_GRASP 目标 (0.20, 0, 0.13) 需要关节解约 [0, +0.5, -0.1, -0.4]
#   从本 home [0, 0.3, 0.3, -0.6] 出发，关节空间步长约 0.5 rad，IK 10 次迭代可收敛
#
#   旧值 [0, -1.047, 0.349, 0.698] 末端在 (0.134, 0, 0.241)，q2=-60°
#   而抓取区需 q2≈+0.5+，关节空间跨度达 88°，超出 10 次 Jacobian 迭代收敛范围
