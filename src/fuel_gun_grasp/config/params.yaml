# ==============================================================================
# 加油枪抓取功能包参数配置文件
# 说明：所有位置均基于机械臂基坐标系（IK 坐标系 = 臂自身坐标系），单位 m / rad / s
#
# ★ 重要：IK 坐标系与 world_fixed 无关
#   open_manipulator_controller 通过 addWorld("world","joint1") 建立内部坐标系，
#   world_fixed joint 的 xyz/rpy（如 base_z=0.70, base_roll=π）
#   仅影响 RViz 可视化，完全不影响 IK 计算坐标系。
#   因此 gun_pose / install_pose 坐标始终在"臂基座=原点"框架下定义。
#
# IK 可达空间（200k 随机采样验证）：
#   X ∈ [-0.35,  0.38]  m    ← 负 X = 臂朝后，IK 极难收敛（需 joint1≈±163°）
#   Y ∈ [-0.37,  0.37]  m
#   Z ∈ [-0.20,  0.45]  m
#
# 安全建议工作区（IK 收敛稳定）：
#   x = 0.08 ~ 0.28 m（正前方，密度最高）
#   |y| < 0.25 m
#   z = -0.10 ~ 0.35 m
#
# ⚠ 禁止区：x < 0 时，joint1 需旋转 ≥90°，与 home(joint1=0°) 差值过大，
#   SR-Jacobian 50 次迭代无法收敛，必然报 is_planned=false。
# ==============================================================================

# ------------------------------------------------------------------------------
# 加油枪起点位置（position）
# 说明：orientation 字段保留供扩展，当前所有运动均调用 position_only 服务，
#       IK 不使用此姿态值，可按实际需求填写参考值。
# ------------------------------------------------------------------------------
gun_pose:
  position:
    x: 0.08     # 加油枪 X 坐标 (m)，机械臂正前方为正
    y: -0.20      # 加油枪 Y 坐标 (m)，机械臂左侧为正
    z: 0.24      # 加油枪 Z 坐标 (m)，竖直向上为正（模拟桌面高度 ~24cm）
  orientation:   # 参考姿态（不参与 IK，保留供调试记录）
    x: 0.0
    y: 0.0
    z: 0.0
    w: 1.0

# ------------------------------------------------------------------------------
# 安装终点位置（position）
# 与 gun_pose 保持相同横向距离，向侧方偏移，高度略高模拟安装口
# 几何验证：到 joint2 平面距离 ≈ 0.210m < 可达 0.244m
# ------------------------------------------------------------------------------
install_pose:
  position:
    x: 0.20      # 安装口 X 坐标 (m)
    y: 0.00      # 安装口 Y 坐标 (m)，向侧方偏移 8cm
    z: 0.30      # 安装口 Z 坐标 (m)
  orientation:
    x: 0.0
    y: 0.0
    z: 0.0
    w: 1.0

# ------------------------------------------------------------------------------
# 预备位参数
# 在抓取/放置点正上方悬停，避免直接从侧面进入导致碰撞
# 预备位 Z = pose.z + offset，需确保合计 Z 仍在可达范围内
# ------------------------------------------------------------------------------
pre_grasp_height_offset: 0.02   # 预备位相对抓取点的 Z 向偏移 (m)
pre_place_height_offset: 0.02   # 放置预备位相对安装点的 Z 向偏移 (m)
lift_height_offset:      0.02   # 抓住加油枪后竖直抬升高度 (m)

# ------------------------------------------------------------------------------
# 夹爪参数
# goal_tool_control 服务，gripper 关节取值范围 [-0.010, 0.019] (m)
# ------------------------------------------------------------------------------
gripper_open_value:  0.010    # 夹爪完全打开时的位移 (m)，>0 表示张开
gripper_grasp_value: -0.005   # 夹爪闭合抓取时的位移 (m)，负值表示收紧

# ------------------------------------------------------------------------------
# 运动时间参数（MinimumJerk 轨迹插值持续时间，值越大运动越慢越平滑）
# ------------------------------------------------------------------------------
path_time_home:     2.0   # 回零位运动时间 (s)
path_time_transit:  1.5   # 空间转移运动时间 (s)
path_time_approach: 1.0   # 竖直接近/放置慢速下降时间 (s)
path_time_lift:     1.0   # 抬升运动时间 (s)
path_time_gripper:  0.8   # 夹爪开合运动时间 (s)

# ------------------------------------------------------------------------------
# 等待时间参数（每步运动后额外 sleep，保证轨迹执行完毕再切换状态）
# 建议：等待时间 >= 0（实际等待 = path_time + wait_after）
# ------------------------------------------------------------------------------
wait_after_open:    1.0   # 夹爪打开后额外等待时间 (s)
wait_after_grasp:   1.5   # 夹爪闭合后额外等待时间 (s)，保证夹持稳定
wait_after_lift:    0.5   # 抬升后额外等待时间 (s)
wait_after_place:   1.0   # 放置后额外等待时间 (s)

# ------------------------------------------------------------------------------
# 回零位关节角度
# 任务开始前先运动到此安全位，避免从未知初始状态直接运动到任务起点造成碰撞
# 顺序：[joint1, joint2, joint3, joint4]，单位 rad
# ------------------------------------------------------------------------------
home_joint_positions: [0.0, 0.3, 0.3, -0.6]
# j1=0°, j2≈+17°, j3≈+17°, j4≈-34°  →  末端约 (0.30, 0, 0.12)
#
# 选此 home 的原因：
#   PRE_GRASP 目标 (0.20, 0, 0.13) 需要关节解约 [0, +0.5, -0.1, -0.4]
#   从本 home [0, 0.3, 0.3, -0.6] 出发，关节空间步长约 0.5 rad，IK 迭代可收敛
#
#   旧值 [0, -1.047, 0.349, 0.698] 末端在 (0.134, 0, 0.241)，q2=-60°
#   而抓取区需 q2≈+0.5+，关节空间跨度达 88°，超出 Jacobian 迭代收敛范围

# ==============================================================================
# 场景模型参数（充电站 / 汽车）
# 用途：在节点启动时向 ROS 发布 visualization_msgs/MarkerArray，
#       在 RViz 中以彩色几何体显示充电站与汽车，辅助调试空间位置。
# 坐标系：所有位置均基于机械臂世界坐标系（world frame，机械臂底座为原点）
#
# 查看方法：
#   在 RViz 中点击 [Add] → [By topic] → 选择 /fuel_gun_grasp_node/scene_markers
# ==============================================================================

# ------------------------------------------------------------------------------
# 充电站模型（charging station）
# 模型组成：主机箱（蓝灰色长方体）+ 加油枪插槽（橙色圆柱）
#
# ★ 位置对齐约束：
#   gun_slot 绝对坐标 = charging_station.pose + charging_station.gun_slot_offset
#   应与上方 gun_pose（加油枪抓取点）一致，否则视觉模型与实际抓取位置不匹配。
#   默认值：(0.20+0.00, 0.04-0.04, 0.00+0.24) = (0.20, 0.00, 0.24)  ← 与 gun_pose ✓
# ------------------------------------------------------------------------------
charging_station:
  pose:                     # 主机箱「底部中心」在 world 坐标系中的位置 (m)
    x: 0.20                 # 与加油枪同一 X 平面
    y: 0.04                 # 机械臂左前方
    z: 0.00                 # 落在地面（底部与地面齐平）
  body_size:                # 主机箱尺寸：宽(x) × 深(y) × 高(z) (m)
    x: 0.12
    y: 0.10
    z: 0.45
  gun_slot_offset:          # 加油枪插槽相对于主机箱底部中心的偏移 (m)
    x: 0.00                 # 与主体同一 X 截面
    y: -0.04                # 朝机械臂方向伸出（正面）
    z: 0.24                 # 高度 24 cm，对应 gun_pose.z

# ------------------------------------------------------------------------------
# 汽车模型（car / fuel vehicle）
# 模型组成：底盘（红色长方体）+ 驾驶室（深红色长方体）+ 加油口（黄色圆柱）
#
# ★ 位置对齐约束：
#   fuel_port 绝对坐标 = car.pose + car.fuel_port_offset
#   应与上方 install_pose（加油枪安装点）一致。
#   默认值：(0.08+0.12, -0.04+0.12, 0.00+0.12) = (0.20, 0.08, 0.12)  ← 与 install_pose ✓
# ------------------------------------------------------------------------------
car:
  pose:                     # 底盘「底部中心」在 world 坐标系中的位置 (m)
    x: 0.08                 # 汽车位于机械臂前偏左
    y: -0.04                # 轻微右偏，留出操作空间
    z: 0.00                 # 底盘贴近地面
  body_size:                # 底盘尺寸：长(x) × 宽(y) × 高(z) (m)
    x: 0.55
    y: 0.24
    z: 0.12
  fuel_port_offset:         # 加油口相对于底盘底部中心的偏移 (m)
    x: 0.12                 # 靠近前端（朝机械臂方向）
    y: 0.12                 # 靠近右侧面（机械臂可达侧）
    z: 0.12                 # 车顶面高度，对应 install_pose.z
